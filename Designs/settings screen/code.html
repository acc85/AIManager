<script>
        // Micro-interactions & Dark Mode Toggle Simulation
        const darkModeToggle = document.getElementById('darkModeToggle');
        darkModeToggle.addEventListener('change', (e) => {
            if (e.target.checked) {
                console.log("Switching to Dark Mode...");
                // In a real app, we'd toggle the class on documentElement
                // document.documentElement.classList.add('dark');
            } else {
                console.log("Switching to Light Mode...");
                // document.documentElement.classList.remove('dark');
            }
        });

        // Hover effect for side nav
        const navItems = document.querySelectorAll('nav a');
        navItems.forEach(item => {
            item.addEventListener('mouseenter', () => {
                if(!item.classList.contains('border-l-4')) {
                    item.style.backgroundColor = 'rgba(255,255,255,0.05)';
                }
            });
            item.addEventListener('mouseleave', () => {
                if(!item.classList.contains('border-l-4')) {
                    item.style.backgroundColor = 'transparent';
                }
            });
        });

        // Temperature slider live feedback
        const tempSlider = document.querySelector('input[type="range"]');
        const tempValueDisplay = document.querySelector('.settings-grid section:nth-child(2) .font-label-sm');
        tempSlider.addEventListener('input', (e) => {
            const val = e.target.value;
            let label = "Balanced";
            if (val < 0.3) label = "Precise";
            else if (val > 0.7) label = "Creative";
            tempValueDisplay.textContent = `${val} ${label}`;
        });
    </script>
